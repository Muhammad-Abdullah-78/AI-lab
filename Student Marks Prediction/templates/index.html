<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Predictor</title>
</head>
<body>

<h1>Student Marks Prediction</h1>

<form action="/predict" method="post">

    <input type="number" step="any" name="study_hours" placeholder="Study Hours" required><br><br>

    <input type="number" step="any" name="attendance" placeholder="Attendance %" required><br><br>

    <input type="number" step="any" name="previous_marks" placeholder="Previous Marks" required><br><br>

    <input type="number" step="any" name="assignments" placeholder="Assignments Completed" required><br><br>

    <button type="submit">Predict</button>

</form>

<h2>{{ prediction_text }}</h2>

</body>
</html>
